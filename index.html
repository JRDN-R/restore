<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Before &amp; After</title>
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif;
      background: #0a0a0a;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── Container ────────────────────────────────── */
    .comparison {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      cursor: col-resize;
    }

    /* ── Image layers ─────────────────────────────── */
    .comparison img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      display: block;
    }

    .comparison .after-wrap {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      overflow: hidden;
    }

    .comparison .after-wrap img {
      width: 100vw;
      min-width: 100vw;
    }

    /* ── Slider line ──────────────────────────────── */
    .slider-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 100%;
      background: #fff;
      transform: translateX(-50%);
      z-index: 10;
      box-shadow: 0 0 12px rgba(0,0,0,.5);
      transition: background .2s;
    }

    /* ── Drag handle ──────────────────────────────── */
    .slider-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .slider-handle:active,
    .slider-handle.dragging {
      transform: translate(-50%, -50%) scale(1.12);
      box-shadow: 0 6px 32px rgba(0,0,0,.5);
    }

    .slider-handle svg {
      width: 28px;
      height: 28px;
      fill: #0a0a0a;
    }

    /* ── Labels ───────────────────────────────────── */
    .label {
      position: absolute;
      bottom: 28px;
      z-index: 5;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      pointer-events: none;
      opacity: .85;
      transition: opacity .3s;
    }

    .label.before {
      left: 20px;
    }

    .label.after {
      right: 20px;
    }

    /* ── Hint animation ───────────────────────────── */
    .hint {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.8);
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      animation: fadeHint 3s 1.5s forwards;
      pointer-events: none;
    }

    @keyframes fadeHint {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }
  </style>
</head>
<body>

  <div class="comparison" id="comparison">

    <!-- BEFORE bottom layer -->
    <img
      src="https://raw.githubusercontent.com/JRDN-R/restore/main/before.png"
      alt="Before"
      draggable="false"
    />

    <!-- AFTER top layer, clipped from left -->
    <div class="after-wrap" id="afterWrap">
      <img
        src="https://raw.githubusercontent.com/JRDN-R/restore/main/after.png"
        alt="After"
        draggable="false"
      />
    </div>

    <!-- Divider line -->
    <div class="slider-line" id="sliderLine"></div>

    <!-- Drag handle -->
    <div class="slider-handle" id="sliderHandle">
      <svg viewBox="0 0 24 24">
        <path
          d="M8.5 17l-1.4-1.4L11.7 12 7.1 7.4 8.5 6l6 6-6 6zm7 0l-1.4-1.4L18.7 12l-4.6-4.6L15.5 6l6 6-6 6z"
          transform="translate(-2,0)"
        />
      </svg>
    </div>

    <!-- Labels -->
    <span class="label before">Before</span>
    <span class="label after">After</span>

    <!-- Hint -->
    <div class="hint">← Drag to compare →</div>
  </div>

  <script>
    (() => {
      const comp = document.getElementById('comparison');
      const afterWrap = document.getElementById('afterWrap');
      const line = document.getElementById('sliderLine');
      const handle = document.getElementById('sliderHandle');

      let isDragging = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function setSlider(x) {
        const rect = comp.getBoundingClientRect();
        const percent = clamp((x - rect.left) / rect.width * 100, 0, 100);

        afterWrap.style.width = percent + '%';
        line.style.left = percent + '%';
        handle.style.left = percent + '%';
      }

      function getClientX(event) {
        if (event.touches && event.touches.length > 0) {
          return event.touches[0].clientX;
        }

        if (event.changedTouches && event.changedTouches.length > 0) {
          return event.changedTouches[0].clientX;
        }

        return event.clientX;
      }

      function onStart(event) {
        event.preventDefault();
        isDragging = true;
        handle.classList.add('dragging');
        setSlider(getClientX(event));
      }

      function onMove(event) {
        if (!isDragging) return;

        event.preventDefault();
        setSlider(getClientX(event));
      }

      function onEnd() {
        isDragging = false;
        handle.classList.remove('dragging');
      }

      comp.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);

      comp.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('touchend', onEnd);
      window.addEventListener('touchcancel', onEnd);

      document.addEventListener('keydown', (event) => {
        const rect = comp.getBoundingClientRect();
        const current = parseFloat(afterWrap.style.width) || 50;

        if (event.key === 'ArrowLeft') {
          setSlider(rect.left + ((current - 2) / 100) * rect.width);
        }

        if (event.key === 'ArrowRight') {
          setSlider(rect.left + ((current + 2) / 100) * rect.width);
        }
      });
    })();
  </script>

</body>
</html>
