<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Restoration</title>
  <meta name="description" content="Photo restoration preview" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Restoration" />
  <meta property="og:description" content="Photo restoration preview" />
  <meta property="og:url" content="https://jrdn-r.github.io/restore/" />
  <meta property="og:image" content="https://raw.githubusercontent.com/JRDN-R/restore/main/after.png" />
  <meta property="og:image:width" content="640" />
  <meta property="og:image:height" content="640" />
  <meta property="og:video" content="https://raw.githubusercontent.com/JRDN-R/restore/main/hero-preview.mp4" />
  <meta property="og:video:secure_url" content="https://raw.githubusercontent.com/JRDN-R/restore/main/hero-preview.mp4" />
  <meta property="og:video:type" content="video/mp4" />
  <meta property="og:video:width" content="640" />
  <meta property="og:video:height" content="640" />
  <meta name="twitter:card" content="player" />
  <meta name="twitter:title" content="Restoration" />
  <meta name="twitter:description" content="Photo restoration preview" />
  <meta name="twitter:player:stream" content="https://raw.githubusercontent.com/JRDN-R/restore/main/hero-preview.mp4" />
  <meta name="twitter:player:stream:content_type" content="video/mp4" />
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif;
      background: #0a0a0a;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ── Container ────────────────────────────────── */
    .comparison {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      cursor: col-resize;
    }

    /* ── Image layers ─────────────────────────────── */
    .comparison img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      display: block;
      transform-origin: center center;
      will-change: transform;
      transition: transform .18s ease;
    }

    .comparison .after-wrap {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      overflow: hidden;
    }

    .comparison .after-wrap img {
      width: 100vw;
      min-width: 100vw;
    }

    /* ── Slider line ──────────────────────────────── */
    .slider-line {
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 100%;
      background: #fff;
      transform: translateX(-50%);
      z-index: 10;
      box-shadow: 0 0 12px rgba(0,0,0,.5);
      transition: background .2s;
    }

    /* ── Drag handle ──────────────────────────────── */
    .slider-handle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .slider-handle:active,
    .slider-handle.dragging {
      transform: translate(-50%, -50%) scale(1.12);
      box-shadow: 0 6px 32px rgba(0,0,0,.5);
    }

    .slider-handle svg {
      width: 28px;
      height: 28px;
      fill: #0a0a0a;
    }

    /* ── Labels ───────────────────────────────────── */
    .label {
      position: absolute;
      bottom: 28px;
      z-index: 5;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      pointer-events: none;
      opacity: .85;
      transition: opacity .3s;
    }

    .label.before {
      left: 20px;
    }

    .label.after {
      right: 20px;
    }

    /* ── Hint animation ───────────────────────────── */
    .hint {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,.8);
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      animation: fadeHint 3s 1.5s forwards;
      pointer-events: none;
    }

    /* ── Zoom controls ────────────────────────────── */
    .zoom-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 60;
      display: grid;
      gap: 8px;
      justify-items: end;
      pointer-events: auto;
      touch-action: manipulation;
    }

    .zoom-controls button {
      border: 0;
      outline: 0;
      color: #fff;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
      border-radius: 999px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      pointer-events: auto;
    }

    .zoom-toggle {
      min-width: 62px;
      min-height: 40px;
      padding: 0 14px;
      letter-spacing: .02em;
    }

    .zoom-toggle.active {
      background: rgba(255,255,255,.95);
      color: #0a0a0a;
    }

    .zoom-panel {
      display: none;
      gap: 8px;
      justify-items: end;
    }

    .zoom-panel.open {
      display: grid;
    }

    .zoom-row,
    .pan-grid {
      display: grid;
      gap: 6px;
      padding: 6px;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,.25);
    }

    .zoom-row {
      grid-template-columns: repeat(3, 40px);
    }

    .pan-grid {
      grid-template-columns: repeat(3, 40px);
    }

    .zoom-row button,
    .pan-grid button {
      width: 40px;
      height: 40px;
      font-size: 18px;
      background: rgba(255,255,255,.16);
    }

    .zoom-row button:active,
    .pan-grid button:active,
    .zoom-toggle:active {
      transform: scale(.96);
    }

    .pan-spacer {
      width: 40px;
      height: 40px;
    }

    @keyframes fadeHint {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }
  </style>
</head>
<body>

  <div class="comparison" id="comparison">

    <!-- BEFORE bottom layer -->
    <img
      class="zoomable"
      src="https://raw.githubusercontent.com/JRDN-R/restore/main/before.png"
      alt="Before"
      draggable="false"
    />

    <!-- AFTER top layer, clipped from left -->
    <div class="after-wrap" id="afterWrap">
      <img
        class="zoomable"
        src="https://raw.githubusercontent.com/JRDN-R/restore/main/after.png"
        alt="After"
        draggable="false"
      />
    </div>

    <!-- Divider line -->
    <div class="slider-line" id="sliderLine"></div>

    <!-- Drag handle -->
    <div class="slider-handle" id="sliderHandle">
      <svg viewBox="0 0 24 24">
        <path
          d="M8.5 17l-1.4-1.4L11.7 12 7.1 7.4 8.5 6l6 6-6 6zm7 0l-1.4-1.4L18.7 12l-4.6-4.6L15.5 6l6 6-6 6z"
          transform="translate(-2,0)"
        />
      </svg>
    </div>

    <!-- Labels -->
    <span class="label before">Before</span>
    <span class="label after">After</span>

    <!-- Hint -->
    <div class="hint">← Drag to compare →</div>

    <!-- Zoom controls -->
    <div class="zoom-controls" id="zoomControls" aria-label="Zoom controls">
      <button class="zoom-toggle" id="zoomToggle" type="button" aria-pressed="false">Zoom</button>

      <div class="zoom-panel" id="zoomPanel" aria-hidden="true">
        <div class="zoom-row">
          <button type="button" data-zoom="out" aria-label="Zoom out">−</button>
          <button type="button" data-zoom="reset" aria-label="Reset zoom">1×</button>
          <button type="button" data-zoom="in" aria-label="Zoom in">+</button>
        </div>

        <div class="pan-grid" aria-label="Pan controls">
          <span class="pan-spacer"></span>
          <button type="button" data-pan="up" aria-label="Move up">↑</button>
          <span class="pan-spacer"></span>
          <button type="button" data-pan="left" aria-label="Move left">←</button>
          <button type="button" data-pan="center" aria-label="Center image">•</button>
          <button type="button" data-pan="right" aria-label="Move right">→</button>
          <span class="pan-spacer"></span>
          <button type="button" data-pan="down" aria-label="Move down">↓</button>
          <span class="pan-spacer"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const comp = document.getElementById('comparison');
      const afterWrap = document.getElementById('afterWrap');
      const line = document.getElementById('sliderLine');
      const handle = document.getElementById('sliderHandle');
      const zoomControls = document.getElementById('zoomControls');
      const zoomToggle = document.getElementById('zoomToggle');
      const zoomPanel = document.getElementById('zoomPanel');
      const zoomableImages = document.querySelectorAll('.zoomable');

      let isDragging = false;
      let zoomMode = false;
      let zoom = 1;
      let panX = 0;
      let panY = 0;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function setSlider(x) {
        const rect = comp.getBoundingClientRect();
        const percent = clamp((x - rect.left) / rect.width * 100, 0, 100);

        afterWrap.style.width = percent + '%';
        line.style.left = percent + '%';
        handle.style.left = percent + '%';
      }

      function getClientX(event) {
        if (event.touches && event.touches.length > 0) {
          return event.touches[0].clientX;
        }

        if (event.changedTouches && event.changedTouches.length > 0) {
          return event.changedTouches[0].clientX;
        }

        return event.clientX;
      }

      function clampPan() {
        if (zoom <= 1) {
          panX = 0;
          panY = 0;
          return;
        }

        const maxX = comp.clientWidth * (zoom - 1) / 2;
        const maxY = comp.clientHeight * (zoom - 1) / 2;

        panX = clamp(panX, -maxX, maxX);
        panY = clamp(panY, -maxY, maxY);
      }

      function applyZoom() {
        clampPan();

        zoomableImages.forEach((img) => {
          img.style.transform = `translate3d(${panX}px, ${panY}px, 0) scale(${zoom})`;
        });
      }

      function setZoomMode(enabled) {
        zoomMode = enabled;
        zoomToggle.classList.toggle('active', enabled);
        zoomToggle.setAttribute('aria-pressed', String(enabled));
        zoomToggle.textContent = enabled ? 'Exit' : 'Zoom';
        zoomPanel.classList.toggle('open', enabled);
        zoomPanel.setAttribute('aria-hidden', String(!enabled));

        if (!enabled) {
          zoom = 1;
          panX = 0;
          panY = 0;
          applyZoom();
        }
      }

      function changeZoom(direction) {
        if (direction === 'reset') {
          zoom = 1;
          panX = 0;
          panY = 0;
        } else if (direction === 'in') {
          zoom = clamp(zoom + .25, 1, 4);
        } else if (direction === 'out') {
          zoom = clamp(zoom - .25, 1, 4);
        }

        applyZoom();
      }

      function panImage(direction) {
        const step = 42;

        if (direction === 'center') {
          panX = 0;
          panY = 0;
        }

        if (zoom <= 1) {
          zoom = 1.25;
        }

        if (direction === 'left') panX += step;
        if (direction === 'right') panX -= step;
        if (direction === 'up') panY += step;
        if (direction === 'down') panY -= step;

        applyZoom();
      }

      function onStart(event) {
        if (event.target.closest('.zoom-controls')) return;

        event.preventDefault();
        isDragging = true;
        handle.classList.add('dragging');
        setSlider(getClientX(event));
      }

      function onMove(event) {
        if (!isDragging) return;

        event.preventDefault();
        setSlider(getClientX(event));
      }

      function onEnd() {
        isDragging = false;
        handle.classList.remove('dragging');
      }

      zoomControls.addEventListener('mousedown', (event) => event.stopPropagation());
      zoomControls.addEventListener('mousemove', (event) => event.stopPropagation());
      zoomControls.addEventListener('mouseup', (event) => event.stopPropagation());
      zoomControls.addEventListener('touchstart', (event) => event.stopPropagation(), { passive: false });
      zoomControls.addEventListener('touchmove', (event) => {
        event.preventDefault();
        event.stopPropagation();
      }, { passive: false });
      zoomControls.addEventListener('touchend', (event) => event.stopPropagation());
      zoomControls.addEventListener('click', (event) => event.stopPropagation());

      zoomToggle.addEventListener('click', () => {
        setZoomMode(!zoomMode);
      });

      zoomPanel.addEventListener('click', (event) => {
        const zoomButton = event.target.closest('[data-zoom]');
        const panButton = event.target.closest('[data-pan]');

        if (zoomButton) {
          changeZoom(zoomButton.dataset.zoom);
        }

        if (panButton) {
          panImage(panButton.dataset.pan);
        }
      });

      comp.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);

      comp.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('touchend', onEnd);
      window.addEventListener('touchcancel', onEnd);

      window.addEventListener('resize', applyZoom);

      document.addEventListener('keydown', (event) => {
        const rect = comp.getBoundingClientRect();
        const current = parseFloat(afterWrap.style.width) || 50;

        if (event.key === 'ArrowLeft') {
          setSlider(rect.left + ((current - 2) / 100) * rect.width);
        }

        if (event.key === 'ArrowRight') {
          setSlider(rect.left + ((current + 2) / 100) * rect.width);
        }
      });
    })();
  </script>

</body>
</html>
